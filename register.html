<script>
(function(){
  const qs=new URLSearchParams(location.search);
  const invite={
    admin:qs.get('admin')||qs.get('owner')||'smartSchoolUnifiedOpsV2',
    token:qs.get('token')||qs.get('register')||'',
    schoolId:qs.get('schoolId')||'',
    schoolName:qs.get('schoolName')||''
  };
  const title=document.getElementById('school-title');
  title.textContent=invite.schoolName?('رابط تسجيل خاص بمدرسة: '+invite.schoolName):'رابط تسجيل مرتبط بالمدرسة';
  document.getElementById('reg-form').addEventListener('submit',function(e){
    e.preventDefault();
    const msg=document.getElementById('msg'); msg.textContent=''; msg.className='text-center text-xs font-bold err';
    if(!invite.admin||!invite.token){ msg.textContent='الرابط غير صالح لأنه غير مرتبط بحساب مدير/ة.'; return; }
    const name=document.getElementById('name').value.trim();
    const email=document.getElementById('email').value.trim();
    const password=document.getElementById('password').value.trim();
    const role=document.getElementById('role').value;
    if(!name||!email||!password||!role){ msg.textContent='يرجى تعبئة الاسم والبريد والرقم السري والقسم.'; return; }
    const account={
      id:'reg_'+Date.now()+'_'+Math.random().toString(36).slice(2),
      name,email,password,loginPassword:password,passwordMasked:'••••••',role,
      phone:'',nationalId:'',schoolName:invite.schoolName,schoolId:invite.schoolId,
      isActive:false,status:'pending',source:'registration_link',
      adminOwnerId:invite.admin,registrationToken:invite.token,registeredViaManagerLink:true,
      permissions:[],
      dateJoined:new Date().toLocaleString('ar-SA')
    };
    const keys=['smartSchoolUnifiedOpsV2_users','smart_school_users'];
    for(const key of keys){
      const all=JSON.parse(localStorage.getItem(key)||'[]');
      const exists=all.some(u=>String(u.email||'').toLowerCase()===email.toLowerCase() && String(u.adminOwnerId||invite.admin)===String(invite.admin));
      if(exists){ msg.textContent='يوجد طلب أو حساب سابق بنفس البريد داخل هذه المدرسة.'; return; }
    }
    for(const key of keys){
      const all=JSON.parse(localStorage.getItem(key)||'[]');
      all.push(account);
      localStorage.setItem(key,JSON.stringify(all));
    }
    document.getElementById('reg-form').classList.add('hide');
    document.getElementById('success').style.display='block';
  });
})();
</script>
<script>

/* ===== V24: Teams Meeting AI مرتبط بزر تعبئة محضر الاجتماعات ===== */
const MEETING_ASK_AI_URL = "https://mfzsgaqxvxusayoribfo.supabase.co/functions/v1/ASK-AI";
const MEETING_SUPABASE_ANON_KEY = "sb_publishable_wrqnWejHyIhaYnMusFfDQQ_6NBvAK9N";

function ensureMeetingAIModal(){
  if(document.getElementById("meetingTeamsAIModal")) return;
  const modal=document.createElement("div");
  modal.id="meetingTeamsAIModal";
  modal.className="meeting-ai-modal";
  modal.innerHTML=`
    <div class="meeting-ai-box">
      <h2>Teams Meeting AI - تعبئة محضر الاجتماع</h2>
      <p style="color:#52635d;font-weight:700">الصق تفريغ اجتماع Teams أو ارفع ملف الحضور/المحادثة، وسيتم استخراج الحضور والقرارات والتوصيات والمهام لتعبئة محضر الاجتماع.</p>
      <div class="meeting-ai-grid">
        <div>
          <label><strong>عنوان الاجتماع</strong></label>
          <input id="meetingAITitle" placeholder="مثال: اجتماع لجنة التميز المدرسي">
        </div>
        <div>
          <label><strong>تاريخ الاجتماع</strong></label>
          <input id="meetingAIDate" placeholder="اليوم / الشهر / السنة">
        </div>
      </div>
      <div class="meeting-ai-grid">
        <div>
          <label><strong>رفع ملف Teams</strong></label>
          <input type="file" accept=".txt,.csv,.json,.log" onchange="readMeetingAIFile(event)">
        </div>
        <div class="meeting-ai-preview" id="meetingAIPreview">سيظهر هنا ملخص أولي للحضور بعد رفع الملف أو لصق النص.</div>
      </div>
      <label><strong>نص الاجتماع أو محادثة Teams</strong></label>
      <textarea id="meetingAIText" placeholder="الصق هنا نص الاجتماع أو المحادثة أو الحضور من Teams..."></textarea>
      <div class="meeting-ai-actions">
        <button onclick="generateMeetingMinutesFromTeamsAI()">تحليل وتعبئة محضر الاجتماع</button>
        <button class="gold" onclick="insertMeetingAIResultToPage()">تضمين آخر نتيجة في المحضر</button>
        <button class="gray" onclick="closeMeetingAIModal()">إغلاق</button>
      </div>
      <div class="meeting-ai-preview" id="meetingAIResult" style="margin-top:12px">لم يتم التحليل بعد.</div>
    </div>`;
  document.body.appendChild(modal);
  const t=document.getElementById("meetingAIText");
  if(t) t.addEventListener("input",()=>previewMeetingAIText(t.value));
}

function openMeetingAIModal(){
  ensureMeetingAIModal();
  const modal=document.getElementById("meetingTeamsAIModal");
  modal.style.display="flex";
  const d=document.getElementById("meetingAIDate");
  if(d && !d.value){
    const now=new Date();
    d.value=String(now.getDate()).padStart(2,"0")+" / "+String(now.getMonth()+1).padStart(2,"0")+" / "+now.getFullYear();
  }
}

function closeMeetingAIModal(){
  const modal=document.getElementById("meetingTeamsAIModal");
  if(modal) modal.style.display="none";
}

function readMeetingAIFile(event){
  const file=event.target.files && event.target.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=()=>{
    const text=String(reader.result||"");
    document.getElementById("meetingAIText").value=text;
    previewMeetingAIText(text);
  };
  reader.readAsText(file,"utf-8");
}

function parseMeetingParticipants(text){
  if(!text) return [];
  const names=[];
  String(text).split(/\r?\n/).map(x=>x.trim()).filter(Boolean).forEach(line=>{
    let cleaned=line
      .replace(/\[[^\]]+\]/g,"")
      .replace(/\([^\)]*(joined|left|انضم|غادر|دخل|خرج)[^\)]*\)/ig,"")
      .replace(/\b(joined|left|started|ended|meeting|chat)\b/ig,"")
      .replace(/^\d{1,2}:\d{2}(:\d{2})?\s*/,"")
      .replace(/[,:؛|-].*$/,"")
      .trim();
    if(cleaned.length>=3 && cleaned.length<=60 && !/[<>@]/.test(cleaned) && !names.includes(cleaned)){
      names.push(cleaned);
    }
  });
  return names.slice(0,50);
}

function previewMeetingAIText(text){
  const participants=parseMeetingParticipants(text);
  const p=document.getElementById("meetingAIPreview");
  if(p) p.innerHTML=`<strong>ملخص أولي:</strong><br>عدد الأسماء المحتملة: ${participants.length}<br>${participants.slice(0,15).join("، ")}${participants.length>15?" ...":""}`;
}

function meetingMinutesPrompt(){
  const title=(document.getElementById("meetingAITitle")||{}).value||"اجتماع مدرسي";
  const date=(document.getElementById("meetingAIDate")||{}).value||"";
  const text=(document.getElementById("meetingAIText")||{}).value||"";
  const participants=parseMeetingParticipants(text);
  return `أنت Teams Meeting AI داخل منصة القيادة المدرسية الذكية.
المطلوب: تحليل اجتماع Teams وتوليد محضر اجتماع رسمي جاهز للتعبئة داخل نموذج محضر الاجتماعات.

عنوان الاجتماع: ${title}
تاريخ الاجتماع: ${date}
الحضور المحتملون: ${participants.join("، ") || "غير محدد"}

نص الاجتماع:
${text}

أعد JSON فقط دون شرح، بالمفاتيح التالية:
{
 "meeting_title": "عنوان الاجتماع",
 "meeting_date": "التاريخ",
 "attendees": "الحضور مفصولين بفواصل",
 "agenda": "محاور الاجتماع",
 "discussion": "ملخص المناقشة",
 "decisions": "القرارات",
 "recommendations": "التوصيات",
 "tasks": "المهام والمسؤوليات",
 "final_minutes": "محضر اجتماع رسمي مختصر"
}`;
}

let lastMeetingAIJson=null;
let lastMeetingAIText="";

function extractMeetingAIJson(text){
  try{return JSON.parse(text)}catch(e){}
  const m=String(text).match(/\{[\s\S]*\}/);
  if(m){try{return JSON.parse(m[0])}catch(e){}}
  return null;
}

async function generateMeetingMinutesFromTeamsAI(){
  const out=document.getElementById("meetingAIResult");
  if(out) out.textContent="جاري تحليل اجتماع Teams وتوليد المحضر...";
  try{
    const res=await fetch(MEETING_ASK_AI_URL,{
      method:"POST",
      headers:{"Content-Type":"application/json","Authorization":"Bearer "+MEETING_SUPABASE_ANON_KEY},
      body:JSON.stringify({message:meetingMinutesPrompt()})
    });
    const data=await res.json();
    const ans=data.response||data.result||data.answer||"لم يتم الحصول على رد.";
    lastMeetingAIText=ans;
    lastMeetingAIJson=extractMeetingAIJson(ans);
    if(out){
      out.innerHTML=lastMeetingAIJson
        ? Object.entries(lastMeetingAIJson).map(([k,v])=>`<strong>${k}</strong><br>${String(v).replace(/\n/g,"<br>")}`).join("<hr>")
        : ans.replace(/\n/g,"<br>");
    }
    insertMeetingAIResultToPage();
  }catch(e){
    if(out) out.textContent="تعذر تحليل الاجتماع: "+e.message;
  }
}

function setFirstAvailable(selectors,value){
  if(!value) return false;
  for(const sel of selectors){
    const el=document.querySelector(sel);
    if(el){
      el.value=value;
      el.dispatchEvent(new Event("input",{bubbles:true}));
      el.dispatchEvent(new Event("change",{bubbles:true}));
      return true;
    }
  }
  return false;
}

function insertMeetingAIResultToPage(){
  const j=lastMeetingAIJson;
  if(!j){
    alert("لا توجد نتيجة مهيكلة بعد. نفّذ التحليل أولًا.");
    return;
  }
  const map=[
    [["[data-field='عنوان الاجتماع']","[name*='title' i]","#meetingTitle"], j.meeting_title],
    [["[data-field='تاريخ الاجتماع']","[name*='date' i]","#meetingDate"], j.meeting_date],
    [["[data-field='الحضور']","[data-field='الحاضرون']","textarea[name*='attendees' i]"], j.attendees],
    [["[data-field='محاور الاجتماع']","[data-field='جدول الأعمال']","textarea[name*='agenda' i]"], j.agenda],
    [["[data-field='ملخص المناقشة']","[data-field='وقائع الاجتماع']","textarea[name*='discussion' i]"], j.discussion],
    [["[data-field='القرارات']","textarea[name*='decisions' i]"], j.decisions],
    [["[data-field='التوصيات']","textarea[name*='recommendations' i]"], j.recommendations],
    [["[data-field='المهام']","[data-field='المسؤوليات']","textarea[name*='tasks' i]"], j.tasks],
    [["[data-field='محضر الاجتماع']","[data-field='المحضر']","textarea[name*='minutes' i]"], j.final_minutes]
  ];
  let count=0;
  map.forEach(([selectors,value])=>{ if(setFirstAvailable(selectors,value)) count++; });
  if(count===0){
    const textareas=Array.from(document.querySelectorAll("textarea"));
    const target=textareas.find(t=>/محضر|اجتماع|توصيات|قرارات|ملاحظات/.test((t.placeholder||"")+" "+(t.getAttribute("data-field")||"")+" "+(t.name||""))) || textareas[textareas.length-1];
    if(target){
      target.value=`عنوان الاجتماع: ${j.meeting_title||""}
التاريخ: ${j.meeting_date||""}
الحضور: ${j.attendees||""}

محاور الاجتماع:
${j.agenda||""}

ملخص المناقشة:
${j.discussion||""}

القرارات:
${j.decisions||""}

التوصيات:
${j.recommendations||""}

المهام والمسؤوليات:
${j.tasks||""}`;
      target.dispatchEvent(new Event("input",{bubbles:true}));
      count=1;
    }
  }
  alert(count ? "تم تضمين نتيجة Teams Meeting AI داخل محضر الاجتماع." : "لم أجد حقول محضر واضحة في الصفحة الحالية، لكن النتيجة موجودة في نافذة Teams AI.");
}

/* ربط أي زر قديم خاص بتعبئة محضر الاجتماع بذكاء Teams */
document.addEventListener("click",function(e){

  }
},true);

</script>

<script>
/* ===== V28: ربط الزر الموجود فقط داخل قاعة الاجتماعات بدون إنشاء أي زر جديد ===== */
document.addEventListener("click", function(e){
  const btn = e.target.closest("button,a,[role='button']");
  if(!btn) return;

  const txt = (btn.innerText || btn.textContent || "").trim();

  const isMeetingFillButton =
    /تعبئة\s*محضر\s*الاجتماع|تعبئة\s*محضر\s*الاجتماعات/i.test(txt);

  if(!isMeetingFillButton) return;

  const container = btn.closest(".modal,.popup,[role='dialog'],section,div");
  const containerText = container ? (container.innerText || container.textContent || "").slice(0, 3000) : "";

  const isInsideMeetingHall =
    /قاعة الاجتماعات|Microsoft Teams|رابط Teams|قائمة الحضور|بنود ومحضر الاجتماع|تنظيم اجتماع/i.test(containerText);

  if(isInsideMeetingHall){
    e.preventDefault();
    e.stopPropagation();
    if(typeof openMeetingAIModal === "function"){
      openMeetingAIModal();
    }else{
      alert("واجهة Teams Meeting AI غير محملة في هذه الصفحة.");
    }
  }
}, true);
</script>
