<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>تسجيل مستخدم جديد - منصة المدرسة الرقمية الذكية</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function(){
  const SUPABASE_URL = 'https://cijhgvbtrvmmlcssgxht.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_3TC1p4w7U3hp2PbzhSauow_2xYLve5l';
  let client = null;
  function getClient(){
    if(client) return client;
    if(!window.supabase || !window.supabase.createClient) return null;
    client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    return client;
  }
  function appRoleToDb(role){
    if(['leadership','manager','مدير'].includes(role)) return 'manager';
    if(['agency','agent','وكيل'].includes(role)) return 'agent';
    if(['performance','teacher','معلم'].includes(role)) return 'teacher';
    if(role === 'owner') return 'owner';
    return role || 'teacher';
  }
  function dbRoleToApp(role){
    if(role === 'manager' || role === 'owner') return 'leadership';
    if(role === 'agent') return 'agency';
    if(role === 'teacher') return 'performance';
    return role || 'performance';
  }
  function normalizeUser(row, school){
    if(!row) return null;
    const appRole = dbRoleToApp(row.role);
    return {
      id: row.id,
      name: row.full_name || row.name || '',
      full_name: row.full_name || row.name || '',
      email: row.email || '',
      password: row.password || '',
      role: appRole,
      dbRole: row.role,
      status: row.status || 'pending',
      isActive: row.status === 'active',
      active: row.status === 'active',
      schoolId: row.school_id || row.schoolId || '',
      schoolName: (school && (school.school_name || school.schoolName)) || row.schoolName || '',
      accountType: row.role === 'manager' ? 'school_manager' : 'school_user',
      isPrimaryManager: !!row.is_primary_manager,
      is_primary_manager: !!row.is_primary_manager,
      mustChangePassword: !!row.must_change_password,
      createdAt: row.created_at || ''
    };
  }
  function normalizeSchool(row){
    if(!row) return null;
    return {
      id: row.id,
      schoolId: row.id,
      schoolCode: row.school_code || row.id,
      schoolName: row.school_name || '',
      managerName: row.manager_name || '',
      managerEmail: row.manager_email || '',
      status: row.status || 'pending',
      registrationCode: row.registration_code || '',
      registrationLink: row.registration_link || '',
      loginLink: row.login_link || '',
      createdAt: row.created_at || ''
    };
  }
  async function listSchools(){
    const sb = getClient(); if(!sb) throw new Error('Supabase غير جاهز');
    const {data,error} = await sb.from('schools').select('*').order('created_at',{ascending:false});
    if(error) throw error;
    return (data||[]).map(normalizeSchool);
  }
  async function insertUserCompat(row){
    const sb = getClient();
    let q = await sb.from('users').insert(row).select('*').single();
    if(q.error && /full_name/i.test(q.error.message || '')){
      const fallback = Object.assign({}, row, { name: row.full_name });
      delete fallback.full_name;
      q = await sb.from('users').insert(fallback).select('*').single();
    }
    if(q.error) throw q.error;
    return q.data;
  }
  async function updateUserCompat(row, id){
    const sb = getClient();
    let q = await sb.from('users').update(row).eq('id',id).select('*').single();
    if(q.error && /full_name/i.test(q.error.message || '')){
      const fallback = Object.assign({}, row, { name: row.full_name });
      delete fallback.full_name;
      q = await sb.from('users').update(fallback).eq('id',id).select('*').single();
    }
    if(q.error) throw q.error;
    return q.data;
  }
  async function createSchoolWithManager(payload){
    const sb = getClient(); if(!sb) throw new Error('Supabase غير جاهز');
    const schoolCode = payload.schoolCode || ('SCH-' + Math.random().toString(36).slice(2,8).toUpperCase());
    const registrationCode = payload.registrationCode || ('REG-' + Math.random().toString(36).slice(2,8).toUpperCase());
    const {data:school,error:schoolErr} = await sb.from('schools').insert({
      school_name: payload.schoolName,
      school_code: schoolCode,
      manager_name: payload.managerName,
      manager_email: payload.email,
      status: 'active',
      registration_code: registrationCode,
      registration_link: payload.registrationLink || null,
      login_link: payload.loginLink || null
    }).select('*').single();
    if(schoolErr) throw schoolErr;
    const user = await insertUserCompat({
      school_id: school.id,
      full_name: payload.managerName,
      email: payload.email,
      password: payload.password,
      role: 'manager',
      status: 'active',
      is_primary_manager: true,
      must_change_password: false
    });
    return { school: normalizeSchool(school), manager: normalizeUser(user, school) };
  }
  async function updateSchoolStatus(schoolId,status){
    const sb = getClient(); if(!sb) throw new Error('Supabase غير جاهز');
    const {error} = await sb.from('schools').update({status}).eq('id',schoolId);
    if(error) throw error;
    await sb.from('users').update({status}).eq('school_id',schoolId).eq('role','manager');
    return true;
  }
  async function registerSchoolUser(payload){
    const sb = getClient(); if(!sb) throw new Error('Supabase غير جاهز');
    let schoolId = payload.schoolId || '';
    let school = null;
    if(schoolId){
      const {data,error} = await sb.from('schools').select('*').eq('id',schoolId).maybeSingle();
      if(!error && data) school = data;
    }
    if(!school && payload.registrationCode){
      const {data,error} = await sb.from('schools').select('*').eq('registration_code',payload.registrationCode).maybeSingle();
      if(!error && data){ school = data; schoolId = data.id; }
    }
    if(!schoolId) throw new Error('الرابط غير مرتبط بمدرسة صحيحة');
    const {data:existing} = await sb.from('users').select('id').eq('email',payload.email).eq('school_id',schoolId).maybeSingle();
    if(existing) throw new Error('يوجد طلب أو حساب سابق بنفس البريد داخل هذه المدرسة');
    const user = await insertUserCompat({
      school_id: schoolId,
      full_name: payload.name,
      email: payload.email,
      password: payload.password,
      role: appRoleToDb(payload.role),
      status: 'pending',
      is_primary_manager: false,
      must_change_password: false
    });
    return normalizeUser(user, school);
  }
  async function listUsersBySchool(schoolId){
    const sb = getClient(); if(!sb) throw new Error('Supabase غير جاهز');
    const {data,error} = await sb.from('users').select('*').eq('school_id',schoolId).order('created_at',{ascending:false});
    if(error) throw error;
    return (data||[]).map(u => normalizeUser(u));
  }
  async function updateUserStatus(userId,status){
    const sb = getClient(); if(!sb) throw new Error('Supabase غير جاهز');
    const {data,error} = await sb.from('users').update({status}).eq('id',userId).select('*').single();
    if(error) throw error;
    return normalizeUser(data);
  }
  async function upsertSchoolUser(payload){
    const sb = getClient(); if(!sb) throw new Error('Supabase غير جاهز');
    const row = {
      school_id: payload.schoolId,
      full_name: payload.name || payload.full_name || '',
      email: payload.email || '',
      password: payload.password || '123456',
      role: appRoleToDb(payload.role),
      status: payload.status || 'pending',
      is_primary_manager: !!payload.isPrimaryManager
    };
    const data = payload.id ? await updateUserCompat(row, payload.id) : await insertUserCompat(row);
    return normalizeUser(data);
  }
  async function login(email,password,schoolId){
    const sb = getClient(); if(!sb) throw new Error('Supabase غير جاهز');
    let query = sb.from('users').select('*').eq('email',email).eq('password',password).neq('status','deleted');
    if(schoolId) query = query.eq('school_id',schoolId);
    const {data,error} = await query.maybeSingle();
    if(error) throw error;
    if(!data) return null;
    let school = null;
    if(data.school_id){
      const sch = await sb.from('schools').select('*').eq('id',data.school_id).maybeSingle();
      if(!sch.error) school = sch.data;
    }
    return normalizeUser(data, school);
  }
  window.SmartSchoolSupabase = { getClient, appRoleToDb, dbRoleToApp, normalizeUser, normalizeSchool, listSchools, createSchoolWithManager, updateSchoolStatus, registerSchoolUser, listUsersBySchool, updateUserStatus, upsertSchoolUser, login };
})();

</script>
<script src="supabase-bridge.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--primary:#1e7b78;--navy:#0f172a}
*{box-sizing:border-box}
body{font-family:'Cairo',sans-serif;background:var(--navy);min-height:100vh;margin:0;color:#0f172a;display:flex;align-items:center;justify-content:center;padding:18px;overflow-x:hidden}
body:before{content:"";position:fixed;inset:0;background:radial-gradient(circle at 20% 10%,rgba(30,123,120,.46),transparent 35%),linear-gradient(135deg,#0f172a,#123b3a);z-index:-1}.card{background:white;border-radius:30px;box-shadow:0 30px 80px rgba(0,0,0,.35);width:100%;max-width:620px;overflow:hidden}.head{background:var(--primary);color:white;padding:24px;text-align:center}.field{width:100%;border:1px solid #cbd5e1;border-radius:16px;padding:15px;font-size:15px;outline:none;background:white}.field:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(30,123,120,.12)}.btn{background:var(--primary);color:white;border:none;border-radius:16px;padding:15px;font-weight:800;width:100%;cursor:pointer;font-size:16px}.hint{background:#f0fdfa;border:1px solid #ccfbf1;color:#115e59;border-radius:18px;padding:14px;font-size:12px;line-height:1.9}.success{display:none;text-align:center;padding:34px}.hide{display:none!important}.err{color:#dc2626}.ok{color:#0f766e}
</style>
</head>
<body>
<div class="card">
  <div class="head">
    <h1 class="text-2xl font-extrabold">واجهة تسجيل المستخدمين</h1>
    <p id="school-title" class="text-sm opacity-90 mt-2">رابط تسجيل مرتبط بالمدرسة</p>
  </div>
  <form id="reg-form" class="p-6 space-y-4">
    <div class="hint">املأ بياناتك، وسيظهر طلبك في أيقونة <b>حسابات المستخدمين</b> بحالة <b>معلّق</b> حتى يقوم المدير/ة بالتفعيل.</div>
    <input class="field" id="name" required placeholder="الاسم">
    <input class="field" id="email" required type="email" placeholder="بريد منصة مدرستي">
    <input class="field" id="password" required type="password" placeholder="الرقم السري">
    <select class="field" id="role" required>
      <option value="" selected disabled>القسم</option>
      <option value="agent">قسم الوكيل/ة</option>
      <option value="teacher">قسم المعلم/ة</option>
    </select>
    <button class="btn" type="submit">إرسال طلب التسجيل</button>
    <p id="msg" class="text-center text-xs font-bold"></p>
  </form>
  <div id="success" class="success">
    <div class="text-6xl mb-4">✅</div>
    <h2 class="text-2xl font-extrabold text-teal-800">تم إرسال طلب التسجيل</h2>
    <p class="text-slate-500 text-sm mt-3">سيظهر الطلب لدى المدير/ة في حسابات المستخدمين بحالة معلّق.</p>
  </div>
</div>
<script>
(function(){
  const qs=new URLSearchParams(location.search);
  const invite={
    admin:qs.get('admin')||qs.get('owner')||'smartSchoolUnifiedOpsV2',
    token:qs.get('token')||qs.get('register')||'',
    schoolId:qs.get('schoolId')||'',
    schoolName:qs.get('schoolName')||''
  };
  const title=document.getElementById('school-title');
  title.textContent=invite.schoolName?('رابط تسجيل خاص بمدرسة: '+invite.schoolName):'رابط تسجيل مرتبط بالمدرسة';
  document.getElementById('reg-form').addEventListener('submit',async function(e){
    e.preventDefault();
    const msg=document.getElementById('msg'); msg.textContent=''; msg.className='text-center text-xs font-bold err';
    if(!invite.admin||!invite.token){ msg.textContent='الرابط غير صالح لأنه غير مرتبط بحساب مدير/ة.'; return; }
    const name=document.getElementById('name').value.trim();
    const email=document.getElementById('email').value.trim();
    const password=document.getElementById('password').value.trim();
    const role=document.getElementById('role').value;
    if(!name||!email||!password||!role){ msg.textContent='يرجى تعبئة الاسم والبريد والرقم السري والقسم.'; return; }
    const account={
      id:'reg_'+Date.now()+'_'+Math.random().toString(36).slice(2),
      name,email,password,loginPassword:password,passwordMasked:'••••••',role,
      phone:'',nationalId:'',schoolName:invite.schoolName,schoolId:invite.schoolId,
      isActive:false,status:'pending',source:'registration_link',
      adminOwnerId:invite.admin,registrationToken:invite.token,registeredViaManagerLink:true,
      permissions:[],
      dateJoined:new Date().toLocaleString('ar-SA')
    };
    try{
      if(window.SmartSchoolSupabase){
        const saved = await window.SmartSchoolSupabase.registerSchoolUser({ name, email, password, role, schoolId: invite.schoolId, registrationCode: invite.token });
        account.id = saved.id; account.schoolId = saved.schoolId || account.schoolId; account.schoolName = saved.schoolName || account.schoolName;
      }
    }catch(err){
      console.error('Supabase registration failed', err);
      msg.textContent = err.message || 'تعذر إرسال الطلب إلى قاعدة البيانات';
      return;
    }
    const keys=['smartSchoolUnifiedOpsV2_users','smart_school_users'];
    for(const key of keys){
      const all=JSON.parse(localStorage.getItem(key)||'[]');
      const exists=all.some(u=>String(u.email||'').toLowerCase()===email.toLowerCase() && String(u.schoolId||'')===String(account.schoolId||''));
      if(!exists){ all.push(account); localStorage.setItem(key,JSON.stringify(all)); }
    }
    document.getElementById('reg-form').classList.add('hide');
    document.getElementById('success').style.display='block';
  });
})();
</script>
</body>
</html>
