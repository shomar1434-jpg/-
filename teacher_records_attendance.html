<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>كشف متابعة غياب الطلاب</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.19.3/package/dist/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.8.0/mammoth.browser.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700;900&display=swap');
    *{box-sizing:border-box}
    body{font-family:'Noto Sans Arabic',Arial,sans-serif;background:#f3f4f6;margin:0;padding:0;color:#111827}
    .topbar{position:fixed;top:0;left:0;right:0;z-index:50;background:rgba(255,255,255,.96);backdrop-filter:blur(8px);box-shadow:0 4px 14px rgba(0,0,0,.08);padding:14px 18px;border-bottom:1px solid #e5e7eb}
    #mainContent{padding:105px 12px 40px;}
    .sheet-page{width:279mm;height:185mm;margin:0 auto 14mm;background:white;border:2px solid #000;border-radius:13px;padding:7mm 8mm;display:flex;flex-direction:column;page-break-after:always;break-after:page;break-inside:avoid;box-shadow:0 8px 24px rgba(0,0,0,.13);overflow:hidden;}
    .sheet-inner{height:100%;display:flex;flex-direction:column;min-height:0;}
    .header{display:grid;grid-template-columns:1.1fr 1.2fr 1.1fr;gap:4mm;align-items:start;margin-bottom:3mm;flex:0 0 auto;}
    .header p{margin:0;line-height:1.55}.header input,.header select{border:0;border-bottom:1px dotted #777;text-align:center;background:transparent;outline:0;font-weight:700;min-width:28mm}.title{font-weight:900;font-size:18px;text-align:center;border-bottom:2px solid #000;display:inline-block;padding:0 12mm 1mm;margin-top:1mm}.logo{width:33mm;height:18mm;object-fit:contain;margin:auto;display:block}.table-wrap{flex:1 1 auto;min-height:0;display:flex;align-items:stretch;}
    table{width:100%;height:100%;border-collapse:collapse;table-layout:fixed;font-size:9px;line-height:1.15}th,td{border:1px solid #000;text-align:center;vertical-align:middle;padding:0;overflow:hidden}thead th{font-weight:900;background:#f3f4f6}.num-col{width:7mm}.name-col{width:48mm}.notes-col{width:25mm}.day-col{width:8.6mm}.student-name{width:100%;height:100%;border:0;outline:0;background:transparent;text-align:right;padding:0 2mm;font-weight:700;font-size:9.5px}.absence-cell{width:100%;height:100%;border:0;outline:0;background:transparent;text-align:center;font-weight:900;font-size:11px}.notes-input{width:100%;height:100%;border:0;outline:0;background:transparent;text-align:right;padding:0 1mm;font-size:9px}.week-head{font-size:9px}.day-head{font-size:8px;writing-mode:horizontal-tb}.footer-sign{display:grid;grid-template-columns:1fr 1fr;gap:50mm;align-items:end;margin-top:3mm;flex:0 0 auto;font-weight:700;font-size:11px}.sig-box{text-align:center}.sig-title{border-bottom:1px solid #999;padding-bottom:1mm;margin-bottom:1mm;font-size:13px;font-weight:900}.sig-input{width:100%;border:0;border-bottom:1px dotted #777;background:transparent;text-align:center;outline:0;font-weight:700}.print-name{display:none}.extract{display:flex;justify-content:space-between;border-top:1px solid #eee;margin-top:2mm;padding-top:1.2mm;font-size:8px;color:#4b5563;flex:0 0 auto}.icon-svg{display:inline-block;vertical-align:middle;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}.preview-mode input,.preview-mode select{pointer-events:none}.clear-btn{opacity:0}.name-cell:hover .clear-btn{opacity:1}.legend{font-size:9px;text-align:center;margin-top:1mm;color:#374151}.modal{position:fixed;inset:0;background:rgba(0,0,0,.48);z-index:60;display:none;align-items:center;justify-content:center;padding:18px}.modal.show{display:flex}.modal-card{background:white;border-radius:22px;box-shadow:0 24px 60px rgba(0,0,0,.28);width:min(620px,95vw);overflow:hidden}
    @media print{
      @page{size:A4 landscape;margin:7mm}
      html,body{width:100%;height:auto;background:#fff!important;margin:0!important;padding:0!important}
      .no-print,.topbar{display:none!important}#mainContent{padding:0!important;margin:0!important}.sheet-page{width:283mm;height:196mm;margin:0 auto!important;padding:6mm 7mm!important;border:2px solid #000!important;border-radius:9px!important;box-shadow:none!important;page-break-after:always;break-after:page;break-inside:avoid;overflow:hidden;background:#fff}.sheet-page:last-child{page-break-after:auto;break-after:auto}.header{margin-bottom:2mm}.title{font-size:16px}.logo{width:30mm;height:16mm}.footer-sign{margin-top:2mm;gap:45mm}.extract{margin-top:1.5mm}.edit-only{display:none!important}.print-name{display:block!important;min-height:5mm;font-weight:900}.student-name,.absence-cell,.notes-input,.header input,.header select,.sig-input{border:none!important;background:transparent!important;appearance:none;-webkit-appearance:none}select::-ms-expand{display:none}table{font-size:8px}th,td{border:1px solid #000!important}.student-name{font-size:8.5px}.day-col{width:8.2mm}.name-col{width:46mm}.notes-col{width:24mm}
    }
  </style>
</head>
<body>
  <div class="topbar no-print">
    <div class="max-w-7xl mx-auto flex flex-wrap gap-3 items-center justify-between">
      <div class="flex flex-wrap gap-2 items-center">
        <input id="searchInput" oninput="handleSearch(this.value)" placeholder="بحث عن اسم طالب..." class="w-60 py-2 px-4 border rounded-xl text-sm outline-none focus:ring-2 focus:ring-blue-500" />
        <button onclick="toggleImportModal()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-xl font-bold text-sm">استيراد الأسماء</button>
        <label class="flex items-center gap-2 text-sm font-bold bg-white border rounded-xl px-3 py-1">
          <span>بداية الأسبوع الأول:</span>
          <input id="weekStartInput" type="date" onchange="setWeekStart(this.value)" class="border rounded-lg px-2 py-1 outline-none" />
        </label>
        <button onclick="addPage()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-xl font-bold text-sm">إضافة صفحة</button>
      </div>
      <div class="flex gap-2">
        <button id="previewBtn" onclick="togglePreview()" class="bg-gray-200 text-gray-700 hover:bg-gray-300 px-4 py-2 rounded-xl font-bold text-sm">وضع المعاينة</button>
        <button onclick="window.print()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-xl font-bold text-sm">طباعة / حفظ PDF</button>
      </div>
    </div>
  </div>

  <main id="mainContent"></main>

  <div id="importModal" class="modal no-print">
    <div class="modal-card text-right">
      <div class="bg-indigo-600 text-white p-5 flex justify-between items-center">
        <h2 class="font-black text-lg">استيراد أسماء الطلاب</h2>
        <button onclick="toggleImportModal()" class="text-2xl leading-none">×</button>
      </div>
      <div class="p-6 space-y-5">
        <div class="border-2 border-dashed border-indigo-200 rounded-2xl p-6 text-center cursor-pointer hover:bg-indigo-50" onclick="document.getElementById('namesFile').click()">
          <div class="font-black text-indigo-700 mb-1">اختر ملف Excel / Word / PDF</div>
          <div class="text-xs text-gray-500">يدعم: xlsx, xls, csv, docx, pdf</div>
          <input type="file" id="namesFile" accept=".xlsx,.xls,.csv,.docx,.pdf" class="hidden" onchange="handleFileImport(event)">
        </div>
        <div>
          <label class="font-bold text-gray-700 text-sm">أو الصق الأسماء مباشرة</label>
          <textarea id="smartPasteText" class="w-full h-32 border rounded-xl mt-2 p-3 outline-none focus:ring-2 focus:ring-indigo-500" placeholder="الصق أسماء الطلاب هنا، كل اسم في سطر مستقل..."></textarea>
          <button onclick="handleSmartPaste()" class="mt-3 w-full bg-indigo-600 text-white py-2 rounded-xl font-bold">تطبيق الأسماء</button>
        </div>
        <p class="text-xs text-gray-500">ملاحظة: ملفات PDF المصورة تحتاج OCR ولا يمكن استخراج نصها محليًا بدقة بدون مكتبة إضافية.</p>
      </div>
    </div>
  </div>

<script>
let students = Array.from({length:45},(_,i)=>({id:i+1,name:'',days:Array(20).fill(''),notes:''}));
let headerInfo={district:'',school:'',grade:'',classroom:'',semester:'الأول',year:'1446',teacherName:'',principalName:'',weekStart:''};
let searchTerm=''; let isPreview=false;
const years=Array.from({length:20},(_,i)=>(1446+i).toString());
const semesters=['الأول','الثاني','الثالث'];
const dayNames=['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس'];
function init(){ if(window.pdfjsLib){pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js'} const inp=document.getElementById('weekStartInput'); if(inp) inp.value=headerInfo.weekStart; render(); }
function esc(s){return String(s??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));}
function render(){
  const container=document.getElementById('mainContent'); container.innerHTML='';
  const filtered=students.filter(s=>(s.name||'').toLowerCase().includes(searchTerm.toLowerCase()));
  const pageCount=Math.max(1,Math.ceil(filtered.length/15));
  for(let pageIndex=0;pageIndex<pageCount;pageIndex++){
    const pageStudents=filtered.slice(pageIndex*15,pageIndex*15+15);
    const page=document.createElement('section'); page.className='sheet-page '+(isPreview?'preview-mode':'');
    page.innerHTML=`<div class="sheet-inner">
      <div class="header">
        <div class="text-center text-xs font-bold">
          <p class="font-black text-sm">المملكة العربية السعودية</p><p>وزارة التعليم</p>
          <p>إدارة التعليم بـ: <input value="${esc(headerInfo.district)}" oninput="updateHeader('district',this.value)" style="width:26mm"></p>
          <p>مدرسة: <input value="${esc(headerInfo.school)}" oninput="updateHeader('school',this.value)" style="width:31mm"></p>
        </div>
        <div class="text-center">
          <img class="logo" src="https://salogos.b-cdn.net/logos/svg/1774895141785-5zgexuf8.svg" alt="وزارة التعليم">
          <div class="title">كشف متابعة غياب الطلاب</div>
          <div class="text-xs font-bold mt-1">العام الدراسي:
            <select onchange="updateHeader('year',this.value)">${years.map(y=>`<option value="${y}" ${headerInfo.year===y?'selected':''}>${y} هـ</option>`).join('')}</select>
          </div>
        </div>
        <div class="text-center text-xs font-bold">
          <p>الصف: <input value="${esc(headerInfo.grade)}" oninput="updateHeader('grade',this.value)" style="width:22mm"></p>
          <p>الفصل/الشعبة: <input value="${esc(headerInfo.classroom)}" oninput="updateHeader('classroom',this.value)" style="width:20mm"></p>
          <p>الفصل الدراسي: <select onchange="updateHeader('semester',this.value)">${semesters.map(s=>`<option value="${s}" ${headerInfo.semester===s?'selected':''}>${s}</option>`).join('')}</select></p>
          <p>بداية الأسبوع: <input type="date" value="${esc(headerInfo.weekStart)}" onchange="setWeekStart(this.value)" style="width:30mm"></p>
          <p class="text-[10px] text-gray-500">صفحة (${pageIndex+1})</p>
        </div>
      </div>
      <div class="table-wrap"><table>
        <thead>
          <tr><th rowspan="3" class="num-col">م</th><th rowspan="3" class="name-col">اسم الطالب</th>${[1,2,3,4].map(w=>`<th colspan="5" class="week-head">الأسبوع ${w}</th>`).join('')}<th rowspan="3" class="notes-col">ملاحظات</th></tr>
          <tr>${[1,2,3,4].map(w=>dayNames.map(d=>`<th class="day-col day-head">${d}</th>`).join('')).join('')}</tr>
          <tr>${Array.from({length:20},(_,i)=>`<th class="day-col day-head">${schoolDateLabel(i)}</th>`).join('')}</tr>
        </thead><tbody>
          ${pageStudents.map((st,idx)=>`<tr>
            <td class="num-col font-bold">${pageIndex*15+idx+1}</td>
            <td class="name-col name-cell relative"><input class="student-name" value="${esc(st.name)}" oninput="updateStudent(${st.id},'name',this.value)" placeholder="اسم الطالب"><button class="clear-btn no-print absolute left-1 top-1 text-red-500" onclick="clearStudent(${st.id})">×</button></td>
            ${Array.from({length:20},(_,d)=>`<td class="day-col"><input class="absence-cell" maxlength="2" value="${esc(st.days[d])}" oninput="updateDay(${st.id},${d},this.value)" title="ضع غ أو ت أو ع"></td>`).join('')}
            <td class="notes-col"><input class="notes-input" value="${esc(st.notes)}" oninput="updateStudent(${st.id},'notes',this.value)"></td>
          </tr>`).join('')}
        </tbody>
      </table></div>
      <div class="legend">رموز مقترحة: غ = غائب، ت = متأخر، ع = عذر</div>
      <div class="footer-sign">
        <div class="sig-box"><div class="sig-title">معلم المادة</div><input class="sig-input edit-only" value="${esc(headerInfo.teacherName)}" oninput="updateHeader('teacherName',this.value)" placeholder="اسم المعلم"><div class="print-name">${esc(headerInfo.teacherName)||'................................'}</div><div>التوقيع: .......................................</div></div>
        <div class="sig-box"><div class="sig-title">مدير المدرسة</div><input class="sig-input edit-only" value="${esc(headerInfo.principalName)}" oninput="updateHeader('principalName',this.value)" placeholder="اسم المدير"><div class="print-name">${esc(headerInfo.principalName)||'................................'}</div><div>الختم والتوقيع: .................................</div></div>
      </div>
      <div class="extract"><span>تاريخ الاستخراج: ${new Date().toLocaleDateString('ar-SA')}</span><span>نظام المتابعة الإلكتروني</span></div>
    </div>`;
    container.appendChild(page);
  }
}

function setWeekStart(value){
  headerInfo.weekStart=value;
  const top=document.getElementById('weekStartInput'); if(top && top.value!==value) top.value=value;
  render();
}
function addSchoolDays(date, days){
  const d=new Date(date.getTime());
  let added=0;
  while(added<days){
    d.setDate(d.getDate()+1);
    const day=d.getDay(); // 0 الأحد، 5 الجمعة، 6 السبت
    if(day!==5 && day!==6) added++;
  }
  return d;
}
function schoolDateLabel(index){
  if(!headerInfo.weekStart) return (index%5)+1;
  const base=new Date(headerInfo.weekStart+'T12:00:00');
  if(Number.isNaN(base.getTime())) return (index%5)+1;
  const d=addSchoolDays(base,index);
  return d.toLocaleDateString('ar-SA-u-ca-gregory',{month:'2-digit',day:'2-digit'});
}

function updateHeader(field,value){headerInfo[field]=value;document.querySelectorAll(`[oninput*="${field}"]`).forEach(el=>{if(el.value!==value)el.value=value});}
function updateStudent(id,field,value){const s=students.find(x=>x.id===id); if(s)s[field]=value;}
function updateDay(id,index,value){const s=students.find(x=>x.id===id); if(s)s.days[index]=value;}
function clearStudent(id){const s=students.find(x=>x.id===id); if(s){s.name='';s.notes='';s.days=Array(20).fill('');render();}}
function handleSearch(v){searchTerm=v;render();}
function togglePreview(){isPreview=!isPreview;document.getElementById('previewBtn').textContent=isPreview?'وضع التحرير':'وضع المعاينة';document.getElementById('previewBtn').className=isPreview?'bg-orange-600 text-white px-4 py-2 rounded-xl font-bold text-sm':'bg-gray-200 text-gray-700 hover:bg-gray-300 px-4 py-2 rounded-xl font-bold text-sm';render();}
function toggleImportModal(){document.getElementById('importModal').classList.toggle('show')}
function setNames(names){names=names.map(n=>String(n).replace(/^[\d\s.\-–—)]+/,'').trim()).filter(n=>n.length>2); if(names.length>students.length){for(let i=students.length;i<names.length;i++)students.push({id:i+1,name:'',days:Array(20).fill(''),notes:''});} names.forEach((n,i)=>{students[i].name=n}); render();}
function handleSmartPaste(){const text=document.getElementById('smartPasteText').value.trim(); if(!text)return; setNames(text.split(/\r?\n/)); toggleImportModal();}
function addPage(){const start=students.length; for(let i=0;i<15;i++)students.push({id:start+i+1,name:'',days:Array(20).fill(''),notes:''}); render();}
async function handleFileImport(e){const file=e.target.files[0]; if(!file)return; const ext=file.name.split('.').pop().toLowerCase(); try{ if(['xlsx','xls','csv'].includes(ext)) await importExcel(file); else if(ext==='docx') await importDocx(file); else if(ext==='pdf') await importPdf(file); else alert('نوع الملف غير مدعوم'); toggleImportModal(); }catch(err){console.error(err); alert('تعذر قراءة الملف. تأكد أن الملف يحتوي على نص قابل للنسخ.');} e.target.value='';}
function namesFromText(text){return text.split(/\r?\n|،|;/).map(x=>x.replace(/^[\d\s.\-–—)]+/,'').trim()).filter(x=>x.length>2 && x.split(/\s+/).length>=2 && !/^(المملكة|وزارة|إدارة|مدرسة|كشف|اسم الطالب|الصف|الأسبوع)/.test(x));}
async function importExcel(file){const buf=await file.arrayBuffer(); const wb=XLSX.read(buf,{type:'array'}); const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1}); const vals=rows.flat().filter(c=>typeof c==='string'||typeof c==='number').map(String); setNames(vals.filter(v=>v.trim().split(/\s+/).length>=2));}
async function importDocx(file){const buf=await file.arrayBuffer(); const res=await mammoth.extractRawText({arrayBuffer:buf}); setNames(namesFromText(res.value));}
async function importPdf(file){const buf=await file.arrayBuffer(); const pdf=await pdfjsLib.getDocument({data:buf}).promise; let text=''; for(let p=1;p<=pdf.numPages;p++){const page=await pdf.getPage(p); const content=await page.getTextContent(); text+=content.items.map(i=>i.str).join('\n')+'\n';} setNames(namesFromText(text));}
window.onload=init;
</script>
</body>
</html>
